name: Deploy MongoDB Cluster on AWS

on:
  workflow_dispatch: # Manual trigger untuk memulai workflow

jobs:
  deploy-mongodb:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install SSH Client
      - name: Install SSH Client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      # 3. Setup SSH Key
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP_MONGODB }} >> ~/.ssh/known_hosts

      # 4. Copy k3s Folder to EC2 Instance
      - name: Copy k3s Folder to EC2 Instance
        run: |
          scp -i ~/.ssh/KEY_BLOC4.pem -r ./k3s ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }}:/home/${{ secrets.EC2_USER_MONGODB }}/

      # 5. Install K3s if not installed
      - name: Install K3s if not already installed
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          set -e
          if ! command -v k3s &> /dev/null; then
            echo "Installing K3s..."
            curl -sfL https://get.k3s.io | sh -
            echo 'alias kubectl="sudo kubectl"' >> ~/.bashrc
            source ~/.bashrc
          else
            echo "K3s is already installed."
          fi
          EOF

      # 6. Deploy MongoDB StatefulSet on Kubernetes
      - name: Deploy MongoDB StatefulSet
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          set -e
          kubectl create namespace mongodb-cluster || echo "Namespace already exists"
          kubectl apply -f /home/${{ secrets.EC2_USER_MONGODB }}/k3s/mongo-statefulset-aws.yaml -n mongodb-cluster
          kubectl get pods -n mongodb-cluster
          kubectl get svc -n mongodb-cluster
          EOF

      # 7. Initialize MongoDB Replica Set
      - name: Initialize MongoDB Replica Set
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          set -e
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongodb-aws-0.mongodb-aws-service:27017" },
              { _id: 1, host: "mongodb-aws-1.mongodb-aws-service:27017" },
              { _id: 2, host: "mongodb-aws-2.mongodb-aws-service:27017" }
            ]
          });'
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
          EOF
