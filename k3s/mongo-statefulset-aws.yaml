apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-aws
  namespace: mongodb-cluster
spec:
  replicas: 3
  serviceName: "mongodb-aws-service"
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongodb  
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "root"
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: "devops"
        - name: MONGO_REPLICA_SET
          value: "rs0"
        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--bind_ip"
        - "0.0.0.0"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-aws-service
  namespace: mongodb-cluster
spec:
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb  
  clusterIP: None
  selector:
    app: mongodb
