name: MongoDB HA Deployment

on:
  workflow_dispatch:

jobs:
  deploy-aws-cluster:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Minikube and Kubectl
      - name: Install Minikube and Kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https curl
          sudo curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          sudo curl -LO "https://dl.k8s.io/release/v1.26.0/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl

      # 3. Start AWS Minikube Cluster
      - name: Start AWS Minikube Cluster
        run: |
          minikube start --profile aws-cluster --kubernetes-version=v1.26.0 --cpus=2 --memory=4g --driver=docker
          kubectl config use-context aws-cluster

      # 4. Deploy MongoDB StatefulSet on AWS
      - name: Deploy MongoDB on AWS
        run: |
          kubectl create namespace aws-namespace || true
          kubectl apply -f k8s/mongo-statefulset-aws.yaml -n aws-namespace

  deploy-ovh-cluster:
    runs-on: self-hosted  # Menjalankan di runner self-hosted OVH
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Minikube and Kubectl
      - name: Install Minikube and Kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https curl
          sudo curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          sudo curl -LO "https://dl.k8s.io/release/v1.26.0/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl

      # 3. Start OVH Minikube Cluster
      - name: Start OVH Minikube Cluster
        run: |
          minikube start --profile ovh-cluster --kubernetes-version=v1.26.0 --cpus=2 --memory=2g --driver=docker
          kubectl config use-context ovh-cluster

      # 4. Deploy MongoDB StatefulSet on OVH
      - name: Deploy MongoDB on OVH
        run: |
          kubectl create namespace ovh-namespace || true
          kubectl apply -f k8s/mongo-statefulset-ovh.yaml -n ovh-namespace

  initialize-replica-set:
    runs-on: ubuntu-latest
    needs: [deploy-aws-cluster, deploy-ovh-cluster]  # Menunggu AWS dan OVH selesai
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Initialize MongoDB Replica Set
        run: |
          kubectl exec -it mongo-aws-0 -n aws-namespace -- mongo --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongo-aws-0.mongo-aws-service.aws-namespace.svc.cluster.local:27017", priority: 2 },
              { _id: 1, host: "mongo-aws-1.mongo-aws-service.aws-namespace.svc.cluster.local:27017", priority: 1 },
              { _id: 2, host: "mongo-aws-2.mongo-aws-service.aws-namespace.svc.cluster.local:27017", priority: 1 },
              { _id: 3, host: "mongo-ovh-0.mongo-ovh-service.ovh-namespace.svc.cluster.local:27017", priority: 0.5 },
              { _id: 4, host: "mongo-ovh-1.mongo-ovh-service.ovh-namespace.svc.cluster.local:27017", priority: 0.5 },
              { _id: 5, host: "mongo-ovh-2.mongo-ovh-service.ovh-namespace.svc.cluster.local:27017", arbiterOnly: true }
            ]
          });'
          kubectl exec -it mongo-aws-0 -n aws-namespace -- mongo --eval 'rs.status();'

      - name: Verify MongoDB Pods
        run: |
          kubectl get pods -n aws-namespace
          kubectl get pods -n ovh-namespace
