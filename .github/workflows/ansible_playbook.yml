name: Setup MongoDB and Grafana with Ansible

on:
  workflow_dispatch: # Untuk menjalankan manual

jobs:
  setup_instances:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Required Dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-dev libffi-dev gcc libssl-dev

      # 3. Install Ansible
      - name: Install Ansible
        run: |
          pip3 install ansible
          ansible --version

      # 4. Set Up SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem

      - name: Add SSH Known Hosts
        run: |
          ssh-keyscan -H 34.230.198.148 >> ~/.ssh/known_hosts || true
          ssh-keyscan -H 3.219.134.157 >> ~/.ssh/known_hosts || true

      # 5. Debug SSH Connection
      - name: Test SSH Connection to MongoDB
        run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ubuntu@34.230.198.148 "echo 'Connection to MongoDB Successful!'"

      - name: Test SSH Connection to Grafana
        run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ec2-user@3.219.134.157 "echo 'Connection to Grafana Successful!'"

      # 6. Run Ansible Playbook
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/setup.yml -vvv
