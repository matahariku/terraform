- name: Add MongoDB repository for Amazon Linux
  ansible.builtin.yum_repository:
    name: mongodb-org-6.0
    description: MongoDB Repository
    baseurl: "{{ mongodb_repo_url }}"
    gpgcheck: yes
    gpgkey: "{{ mongodb_repo_gpgkey }}"
    enabled: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Update yum cache
  ansible.builtin.yum:
    update_cache: yes

- name: Check availability of MongoDB packages
  ansible.builtin.shell: yum list available | grep mongodb
  register: mongodb_package_check
  ignore_errors: yes

- name: Debug MongoDB package check
  ansible.builtin.debug:
    var: mongodb_package_check.stdout

- name: Install MongoDB and Mongosh
  ansible.builtin.yum:
    name: "{{ mongodb_packages }}"
    state: present
  when: ansible_facts['distribution'] == "Amazon"

- name: Create mongod user
  ansible.builtin.user:
    name: mongod
    state: present
    shell: /sbin/nologin

- name: Deploy mongod configuration
  ansible.builtin.template:
    src: mongod.conf.j2
    dest: /etc/mongod.conf
    owner: mongod
    group: mongod
    mode: '0644'

- name: Restart MongoDB service
  ansible.builtin.systemd:
    name: "{{ mongodb_service }}"
    state: restarted
    enabled: yes

- name: Verify MongoDB installation
  ansible.builtin.command:
    cmd: mongod --version
  register: mongod_version
  ignore_errors: yes

- name: Display MongoDB version
  ansible.builtin.debug:
    msg: "MongoDB version: {{ mongod_version.stdout }}"
