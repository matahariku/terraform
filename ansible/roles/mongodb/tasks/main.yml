- block:
    - name: Install Required Dependencies for Docker
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes

    - name: Fix deprecated GPG keyring issue
      ansible.builtin.shell: |
        mkdir -p /usr/share/keyrings
        wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor > /usr/share/keyrings/grafana.gpg
        echo "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main" | tee /etc/apt/sources.list.d/grafana.list
      when: ansible_distribution == "Ubuntu"

    - name: Add Docker GPG Key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/grafana.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: present

    - name: Start Docker Service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Pull MongoDB Docker Image
      ansible.builtin.docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Stop Existing MongoDB Container (if any)
      ansible.builtin.shell: |
        docker stop mongodb || true
        docker rm mongodb || true

    - name: Run MongoDB Docker Container
      ansible.builtin.docker_container:
        name: "{{ docker_container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        ports:
          - "{{ docker_port }}:27017"
        volumes:
          - "mongodb_data:/data/db"
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: devops
  when: ansible_distribution == "Ubuntu"
