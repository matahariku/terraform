- name: Install Docker
  ansible.builtin.yum:
    name: docker
    state: present
  when: ansible_facts['distribution'] == "Amazon"

- name: Start Docker Service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Pull MongoDB Docker Image
  ansible.builtin.docker_image:
    name: "{{ docker_image }}"
    source: pull

- name: Create MongoDB Volume (Optional)
  ansible.builtin.command:
    cmd: docker volume create mongodb_data
  ignore_errors: yes

- name: Run MongoDB Docker Container
  ansible.builtin.docker_container:
    name: "{{ docker_container_name }}"
    image: "{{ docker_image }}"
    state: started
    restart_policy: always
    ports:
      - "{{ docker_port }}:27017"
    volumes:
      - "mongodb_data:/data/db"
    env:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devops
  notify: Restart MongoDB Docker Container
