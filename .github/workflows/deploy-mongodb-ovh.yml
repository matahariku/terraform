name: Deploy MongoDB on OVH

on:
  workflow_dispatch:

jobs:
  deploy-mongodb-ovh:
    name: Deploy MongoDB to OVH
    runs-on: self-hosted

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configure Kubectl for OVH
      - name: Configure Kubectl for OVH
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl config use-context ovh-cluster

      # 3. Deploy MongoDB StatefulSet
      - name: Deploy MongoDB StatefulSet
        run: |
          kubectl apply -f ./minikube/mongo-statefulset-ovh.yaml

      # 4. Add OVH Node to Replica Set
      - name: Add OVH Node to Replica Set
        run: |
          kubectl exec -it mongo-0 -n mongo-namespace -- mongo --eval '
            rs.add("mongo-0.mongo-service.mongo-namespace.svc.cluster.local:27017");
          '

      # 5. Add OVH Node IP to Replica Set (AWS example equivalent)
      - name: Add OVH Node to Replica Set
        run: |
          kubectl exec -it mongo-0 -n mongo-namespace -- mongo --eval '
            rs.add("OVH_PUBLIC_IP:27017");
          '
