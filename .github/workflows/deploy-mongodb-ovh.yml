name: Deploy MongoDB on OVH

on:
  workflow_dispatch:

jobs:
  deploy-mongodb-ovh:
    name: Deploy MongoDB to OVH
    runs-on: self-hosted

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install Minikube
      - name: Install Minikube
        run: |
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube

      # 3. Start Minikube Cluster
      - name: Start OVH Minikube Cluster
        run: |
          minikube start --profile ovh-cluster --kubernetes-version=v1.26.0 --cpus=2 --memory=4g --driver=docker

      # 4. Configure Kubectl
      - name: Configure Kubectl for OVH
        run: |
          minikube kubectl -- --context=ovh-cluster config use-context ovh-cluster

      # 5. Deploy MongoDB StatefulSet
      - name: Deploy MongoDB StatefulSet
        run: |
          minikube kubectl -- --context=ovh-cluster apply -f ./minikube/mongo-statefulset-ovh.yaml

      # 6. Add OVH Node to Replica Set
      - name: Add OVH Node to Replica Set
        run: |
          minikube kubectl -- --context=ovh-cluster exec -it mongo-0 -n mongo-namespace -- mongo --eval '
            rs.add("mongo-0.mongo-service.mongo-namespace.svc.cluster.local:27017");
          '
