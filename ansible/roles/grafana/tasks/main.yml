# roles/grafana/tasks/main.yml
- name: Update apt repository cache
  apt:
    update_cache: yes
  become: true
  when: ansible_distribution == "Ubuntu"

- name: Install python3-apt (Grafana dependencies)
  apt:
    name: python3-apt
    state: present
  become: true
  when: ansible_distribution == "Ubuntu"

- name: Install Grafana (Ubuntu)
  apt:
    name: grafana
    state: present
  become: true
  when: ansible_distribution == "Ubuntu"

- name: Enable and start Grafana service (Ubuntu)
  systemd:
    name: grafana-server
    state: started
    enabled: true
  become: true
  when: ansible_distribution == "Ubuntu"
