name: Install MongoDB and Grafana

on:
  workflow_dispatch: # Jalankan secara manual

jobs:
  install_services:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Ansible Roles
      - name: Install Ansible Roles
        run: ansible-galaxy install -r ansible/requirements.yml --force

      # 3. Run Ansible Playbook to Install MongoDB
      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/setup.yml
