name: Multi-Cluster MongoDB Deployment

on:
  workflow_dispatch:

jobs:
  aws-cluster:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Minikube and Kubectl
      - name: Install Minikube and Kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https curl
          sudo curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          sudo curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl

      # 3. Start Minikube Cluster for AWS
      - name: Start Minikube Cluster (AWS)
        run: |
          minikube start --profile aws-cluster --kubernetes-version=v1.26.0 --cpus=2 --memory=2g
          kubectl config use-context aws-cluster

      # 4. Deploy MongoDB StatefulSet to AWS
      - name: Deploy MongoDB to AWS
        run: |
          kubectl create namespace aws-namespace
          kubectl apply -f k8s/mongo-statefulset-aws.yaml -n aws-namespace

  ovh-cluster:
    runs-on: self-hosted
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Minikube and Kubectl on Self-Hosted Runner
      - name: Install Minikube and Kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https curl
          sudo curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          sudo curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl

      # 3. Start Minikube Cluster for OVH
      - name: Start Minikube Cluster (OVH)
        run: |
          minikube start --profile ovh-cluster --kubernetes-version=v1.26.0 --cpus=2 --memory=2g
          kubectl config use-context ovh-cluster

      # 4. Deploy MongoDB StatefulSet to OVH
      - name: Deploy MongoDB to OVH
        run: |
          kubectl create namespace ovh-namespace
          kubectl apply -f k8s/mongo-statefulset-ovh.yaml -n ovh-namespace
