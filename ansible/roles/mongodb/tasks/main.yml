- block:
    - name: Install Required Dependencies for Docker
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes

    - name: Fix deprecated GPG keyring issue
      ansible.builtin.shell: |
        mkdir -p /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        curl -fsSL https://packages.grafana.com/gpg.key | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
      when: ansible_distribution == "Ubuntu"

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
    
    - name: Add Grafana Repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://packages.grafana.com/oss/deb stable main"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: present

    - name: Start Docker Service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Pull MongoDB Docker Image
      ansible.builtin.docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Stop Existing MongoDB Container (if any)
      ansible.builtin.shell: |
        docker stop mongodb || true
        docker rm mongodb || true

    - name: Run MongoDB Docker Container
      ansible.builtin.docker_container:
        name: "{{ docker_container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        ports:
          - "{{ docker_port }}:27017"
        volumes:
          - "mongodb_data:/data/db"
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: devops
  when: ansible_distribution == "Ubuntu"
