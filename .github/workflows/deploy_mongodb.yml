name: Deploy MongoDB to Kubernetes

on:
  workflow_dispatch: 
    inputs:
      kubeconfig:
        description: "Kubeconfig file"
        required: true

jobs:
  deploy-mongodb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.30.8'

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    - name: Verify Kubernetes Nodes
      run: |
        kubectl get nodes

    - name: Apply MongoDB Deployment
      run: |
        kubectl apply -f mongodb/mongodb-deployment.yaml
