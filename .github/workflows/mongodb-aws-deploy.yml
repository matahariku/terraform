name: Deploy MongoDB Cluster on AWS

on:
  workflow_dispatch: # Manual trigger for running the workflow

jobs:
  deploy-mongodb:
    runs-on: ubuntu-latest # Use the default GitHub runner (can be self-hosted if desired)

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        # This step checks out the repository to ensure that the necessary files are available to the runner

      # 2. Install SSH client
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client
        # Install the SSH client to allow SSH connections to the EC2 instance

      # 3. Setup SSH Key and Configure SSH
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP_MONGODB }} >> ~/.ssh/known_hosts
        # This step sets up the SSH key for connecting to the EC2 instance
        # The SSH key is stored securely in GitHub Secrets and will be used for authentication

      # 4. Deploy MongoDB StatefulSet
      - name: Deploy MongoDB StatefulSet on AWS
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          echo "Deploying MongoDB StatefulSet on Kubernetes"
          kubectl apply -f ~/k3s/mongo-statefulset-aws.yaml
          echo "Verifying MongoDB Pods"
          kubectl get pods -n mongodb-cluster
          echo "Verifying MongoDB Service"
          kubectl get svc -n mongodb-cluster
          EOF
        # This step SSHs into the EC2 instance, deploys the MongoDB StatefulSet YAML, and verifies the deployment

      # 5. Initialize MongoDB Replica Set
      - name: Initialize MongoDB Replica Set
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          echo "Initializing MongoDB Replica Set"
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongodb-aws-0.mongodb-aws-service:27017" },
              { _id: 1, host: "mongodb-aws-1.mongodb-aws-service:27017" },
              { _id: 2, host: "mongodb-aws-2.mongodb-aws-service:27017" }
            ]
          });'
          echo "Verifying Replica Set Status"
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
          EOF
        # This step initializes the MongoDB replica set on the deployed MongoDB StatefulSet

