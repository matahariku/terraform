- block:
    - name: Ensure /usr/share/keyrings directory exists
      file:
        path: /usr/share/keyrings
        state: directory

    - name: Add Grafana GPG key directly to keyring
      get_url:
        url: https://packages.grafana.com/gpg.key
        dest: /usr/share/keyrings/grafana-archive-keyring.gpg
        mode: '0644'

    - name: Add Grafana APT repository
      copy:
        content: |
          deb [signed-by=/usr/share/keyrings/grafana-archive-keyring.gpg] https://packages.grafana.com/oss/deb stable main
        dest: /etc/apt/sources.list.d/grafana.list

    - name: Update apt repository cache
      apt:
        update_cache: yes

    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Enable and start Grafana service
      systemd:
        name: grafana-server
        state: started
        enabled: true

    - name: Configure Grafana
      template:
        src: grafana.ini.j2
        dest: /etc/grafana/grafana.ini
      notify:
        - Restart Grafana
  when: ansible_distribution == "Ubuntu"
