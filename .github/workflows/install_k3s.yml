name: Installer K3s et kubectl

on:
  workflow_dispatch: # Permet de lancer manuellement le workflow

jobs:
  setup-k3s:
    runs-on: ubuntu-latest

    steps:
      # 1. Vérifier le dépôt
      - name: Vérifier le dépôt
        uses: actions/checkout@v3

      # 2. Installer les dépendances
      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget

      # 3. Installer K3s
      - name: Installer K3s
        run: |
          curl -sfL https://get.k3s.io | sh -
          sudo ln -s /usr/local/bin/k3s /usr/bin/k3s
          sudo k3s kubectl get nodes

      # 4. Configurer kubectl et définir les permissions
      - name: Configurer kubectl et définir les permissions
        run: |
          # Membuat direktori .kube jika belum ada
          mkdir -p $HOME/.kube
          
          # Salin file k3s.yaml ke dalam .kube/config tanpa menggunakan sudo
          cp /etc/rancher/k3s/k3s.yaml $HOME/.kube/config
          
          # Ubah pemilik dan izin file
          chown runner:runner $HOME/.kube/config
          chmod 600 $HOME/.kube/config

          # Memverifikasi versi kubectl
          export KUBEVERSION=$(kubectl version --short | awk -Fv '/Client Version/ {print $3}')
          echo "La version de Kubernetes est $KUBEVERSION"

      # 5. Tester kubectl
      - name: Tester kubectl
        run: |
          echo "Tester kubectl"
          kubectl get nodes
