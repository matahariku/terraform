apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-ovh
  namespace: mongodb-cluster
spec:
  replicas: 3
  serviceName: "mongodb-ovh-service"
  selector:
    matchLabels:
      app: mongodb-ovh
  template:
    metadata:
      labels:
        app: mongodb-ovh
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo-secrets
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secrets
              key: password
        - name: MONGO_REPLICA_SET
          value: "rs0"
        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--bind_ip"
        - "0.0.0.0"
        - "--wiredTigerCacheSizeGB"
        - "1"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-ovh-service
  namespace: mongodb-cluster
spec:
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb
  selector:
    app: mongodb-ovh
  clusterIP: None
