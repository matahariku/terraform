name: Deploy MongoDB Cluster (AWS)

on:
  workflow_dispatch: # Pemicu manual

jobs:
  deploy-mongodb-aws:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      # Mendapatkan repository untuk memastikan file YAML tersedia
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Upload YAML file to AWS
      # Mengunggah file YAML ke server AWS
      - name: Upload MongoDB YAML file to AWS
        uses: garygrossgarten/github-action-scp@v1
        with:
          local: terraform/k3s/mongo-statefulset-aws.yaml
          remote: ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }}:~/cafe-nangka/terraform/k3s/mongo-statefulset-aws.yaml
          port: 22
          privateKey: ${{ secrets.KEY_BLOC4 }}

      # 3. Install K3s and Configure kubectl
      # Memastikan K3s terinstal dan berjalan di server AWS
      - name: Install K3s and Configure kubectl
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_PUBLIC_IP_MONGODB }}
          username: ${{ secrets.EC2_USER_MONGODB }}
          key: ${{ secrets.KEY_BLOC4 }}
          script: |
            if ! systemctl is-active --quiet k3s; then
              echo "Installing K3s..."
              curl -sfL https://get.k3s.io | sh -
            else
              echo "K3s is already running"
            fi
            mkdir -p ~/.kube
            sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
            sudo chown $USER:$USER ~/.kube/config
            export KUBECONFIG=~/.kube/config
            echo "Verifying K3s installation..."
            kubectl version --client
            kubectl create namespace mongodb-cluster || echo "Namespace already exists"

      # 4. Deploy MongoDB StatefulSet
      # Melakukan deployment StatefulSet MongoDB
      - name: Deploy MongoDB StatefulSet
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_PUBLIC_IP_MONGODB }}
          username: ${{ secrets.EC2_USER_MONGODB }}
          key: ${{ secrets.KEY_BLOC4 }}
          script: |
            echo "Deploying MongoDB StatefulSet to K3s..."
            kubectl apply -f ~/cafe-nangka/terraform/k3s/mongo-statefulset-aws.yaml
            echo "Verifying MongoDB Deployment..."
            kubectl get pods -n mongodb-cluster
            kubectl get svc mongodb-aws-service -n mongodb-cluster

      # 5. Initialize MongoDB Replica Set
      # Menginisialisasi Replica Set MongoDB untuk sinkronisasi antar pod
      - name: Initialize MongoDB Replica Set
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_PUBLIC_IP_MONGODB }}
          username: ${{ secrets.EC2_USER_MONGODB }}
          key: ${{ secrets.KEY_BLOC4 }}
          script: |
            echo "Initializing MongoDB Replica Set..."
            kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval '
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongodb-aws-0.mongodb-aws-service:27017" },
                { _id: 1, host: "mongodb-aws-1.mongodb-aws-service:27017" },
                { _id: 2, host: "mongodb-aws-2.mongodb-aws-service:27017" }
              ]
            });'
            echo "Verifying Replica Set Status..."
            kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
