# roles/mongodb/tasks/main.yml

- name: Ensure Python is installed (Amazon Linux)
  # Memastikan Python 3 terinstal pada Amazon Linux
  yum:
    name: python3
    state: present
  when: ansible_distribution == "Amazon"

- name: Configure Python 3 as the default interpreter (Amazon Linux)
  # Mengonfigurasi Python 3 sebagai interpreter default
  alternatives:
    name: python
    path: /usr/bin/python3
    state: present
  when: ansible_distribution == "Amazon"

- name: Ensure MongoDB repository is available (Amazon Linux)
  # Menambahkan repository MongoDB untuk Amazon Linux
  amazon.aws.yum_repository:
    name: mongodb-org-5.0
    description: MongoDB Repository
    baseurl: https://repo.mongodb.org/yum/amazon/2/mongodb-org/5.0/x86_64/
    gpgcheck: yes
    enabled: yes
    gpgkey: https://www.mongodb.org/static/pgp/server-5.0.asc
  when: ansible_distribution == "Amazon"

- name: Install MongoDB (Amazon Linux)
  # Menginstal paket MongoDB dari repository yang ditambahkan
  yum:
    name: mongodb-org
    state: present
  when: ansible_distribution == "Amazon"

- name: Enable and start MongoDB service (Amazon Linux)
  # Mengaktifkan dan memulai layanan MongoDB
  systemd:
    name: mongod
    state: started
    enabled: true
  when: ansible_distribution == "Amazon"
