- name: Add MongoDB repository for Amazon Linux
  ansible.builtin.yum_repository:
    name: mongodb-org-6.0
    description: MongoDB Repository
    baseurl: "https://repo.mongodb.org/yum/amazon/2023/mongodb-org/6.0/x86_64/"
    gpgcheck: yes
    gpgkey: "https://www.mongodb.org/static/pgp/server-6.0.asc"
    enabled: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Remove conflicting curl-minimal package (Amazon Linux)
  ansible.builtin.yum:
    name: curl-minimal
    state: absent
  when: ansible_facts['distribution'] == "Amazon"

- name: Install curl (Amazon Linux)
  ansible.builtin.yum:
    name: curl
    state: present
  when: ansible_facts['distribution'] == "Amazon"

- name: Install MongoDB and Mongosh on Amazon Linux
  ansible.builtin.yum:
    name:
      - mongodb-org
      - mongodb-mongosh
    state: present
  when: ansible_facts['distribution'] == "Amazon"

- name: Start MongoDB service
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Verify mongosh installation
  ansible.builtin.command:
    cmd: mongosh --version
  register: mongosh_version
  when: ansible_facts['distribution'] == "Amazon"

- name: Print mongosh version
  ansible.builtin.debug:
    msg: "Installed mongosh version: {{ mongosh_version.stdout }}"
  when: ansible_facts['distribution'] == "Amazon"
