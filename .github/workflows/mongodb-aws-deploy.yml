name: Deploy MongoDB Cluster

on:
  workflow_dispatch: # Trigger manual untuk memulai workflow

jobs:
  deploy-mongodb:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Configure K3s Access
      - name: Configure K3s Access
        run: |
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chmod 600 ~/.kube/config

      # 3. Create Namespace
      - name: Create Namespace
        run: |
          kubectl create namespace mongodb-cluster || echo "Namespace already exists"

      # 4. Create Kubernetes Secrets for MongoDB
      - name: Create Kubernetes Secrets for MongoDB
        run: |
          kubectl create secret generic mongo-secrets \
            --from-literal=username=${{ secrets.MONGO_USERNAME }} \
            --from-literal=password=${{ secrets.MONGO_PASSWORD }} \
            -n mongodb-cluster

      # 5. Deploy MongoDB StatefulSet
      - name: Deploy MongoDB StatefulSet
        run: |
          kubectl apply -f ./k3s/mongo-statefulset-aws.yaml
          kubectl get pods -n mongodb-cluster
          kubectl get svc -n mongodb-cluster

      # 6. Wait for MongoDB Pods to be Ready
      - name: Wait for MongoDB Pods
        run: |
          kubectl wait --for=condition=ready pod -l app=mongodb-worker -n mongodb-cluster --timeout=300s

      # 7. Initialize MongoDB Replica Set
      - name: Initialize MongoDB Replica Set
        run: |
          kubectl exec -it mongodb-master-0 -n mongodb-cluster -- mongo --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongodb-master-0.mongodb-workers-service:27017" },
              { _id: 1, host: "mongodb-master-1.mongodb-workers-service:27017" },
              { _id: 2, host: "mongodb-master-2.mongodb-workers-service:27017" }
            ]
          });'
          kubectl exec -it mongodb-master-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
