name: Deploy MongoDB Cluster on AWS

on:
  workflow_dispatch:  # Manual trigger for the workflow

jobs:
  deploy-mongodb:
    runs-on: ubuntu-latest  # Use GitHub's default runner

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install SSH Client
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      # 3. Setup SSH Key
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem
          ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP_MONGODB }} >> ~/.ssh/known_hosts

      # 4. Deploy MongoDB StatefulSet
      - name: Deploy MongoDB StatefulSet on AWS
        run: |
          echo "Copying MongoDB StatefulSet YAML to EC2 instance"
          scp -i ~/.ssh/KEY_BLOC4.pem ./k3s/mongo-statefulset-aws.yaml ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }}:/home/${{ secrets.EC2_USER_MONGODB }}/k3s/mongo-statefulset-aws.yaml
          
          echo "Deploying MongoDB StatefulSet on Kubernetes"
          ssh -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          kubectl apply -f /home/${{ secrets.EC2_USER_MONGODB }}/k3s/mongo-statefulset-aws.yaml
          echo "Verifying MongoDB Pods"
          kubectl get pods -n mongodb-cluster
          echo "Verifying MongoDB Service"
          kubectl get svc -n mongodb-cluster
          EOF

      # 5. Initialize MongoDB Replica Set
      - name: Initialize MongoDB Replica Set
        run: |
          ssh -i ~/.ssh/KEY_BLOC4.pem ${{ secrets.EC2_USER_MONGODB }}@${{ secrets.EC2_PUBLIC_IP_MONGODB }} << 'EOF'
          echo "Initializing MongoDB Replica Set"
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongodb-aws-0.mongodb-aws-service:27017" },
              { _id: 1, host: "mongodb-aws-1.mongodb-aws-service:27017" },
              { _id: 2, host: "mongodb-aws-2.mongodb-aws-service:27017" }
            ]
          });'
          echo "Verifying Replica Set Status"
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
          EOF
