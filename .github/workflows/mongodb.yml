name: Install MongoDB and Mongosh on Amazon Linux

on:
  workflow_dispatch: # Exécuter manuellement

jobs:
  install_mongosh:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Installer les dépendances nécessaires pour Ansible
      - name: Install Required Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-dev libffi-dev gcc libssl-dev

      # 3. Installer Ansible via pip
      - name: Install Ansible
        run: |
          pip3 install ansible
          ansible --version

      # 4. Ajouter les hôtes SSH à known_hosts
      - name: Add SSH Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.230.198.148 >> ~/.ssh/known_hosts || echo "Échec de l'ajout de 34.230.198.148"
          ssh-keyscan -H 3.219.134.157 >> ~/.ssh/known_hosts || echo "Échec de l'ajout de 3.219.134.157"

      # 5. Définir la clé SSH privée
      - name: Set Up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem

      # 6. Installer MongoDB et Mongosh sur Amazon Linux
      - name: Install MongoDB and Mongosh on Amazon Linux
        run: |
          ssh -i ~/.ssh/KEY_BLOC4.pem ec2-user@34.230.198.148 << 'EOF'
            # Ajouter le repository MongoDB
            echo "[mongodb-org-6.0]
            name=MongoDB Repository
            baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/6.0/x86_64/
            gpgcheck=1
            enabled=1
            gpgkey=https://www.mongodb.org/static/pgp/server-6.0.asc" | sudo tee /etc/yum.repos.d/mongodb-org-6.0.repo

            # Installer MongoDB et mongosh
            sudo yum install -y mongodb-org
            sudo yum install -y mongodb-mongosh

            # Démarrer MongoDB
            sudo systemctl start mongod
            sudo systemctl enable mongod

            # Vérifier que mongosh fonctionne
            mongosh --version

            # Vérifier le statut du service MongoDB
            sudo systemctl status mongod
          EOF

      # 7. Exécuter le playbook Ansible (si nécessaire pour d'autres configurations)
      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/setup.yml
        env:
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/KEY_BLOC4.pem
