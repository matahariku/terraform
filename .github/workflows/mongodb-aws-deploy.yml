name: Deploy Multi-Cluster MongoDB

on:
  workflow_dispatch: # Trigger manual

jobs:
  deploy-aws:
    runs-on: ubuntu-latest # Gunakan runner GitHub hosted untuk AWS
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Configure K3s Access (AWS)
      - name: Configure K3s Access for AWS
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.AWS_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # 3. Deploy MongoDB StatefulSet in AWS
      - name: Deploy MongoDB in AWS
        run: |
          kubectl apply -f ./k3s/mongo-statefulset-aws.yaml
          kubectl get pods -n mongodb-cluster
          kubectl get svc -n mongodb-cluster

  deploy-ovh:
    runs-on: self-hosted # Gunakan runner self-hosted untuk OVH
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Configure K3s Access (OVH)
      - name: Configure K3s Access for OVH
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.OVH_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # 3. Deploy MongoDB StatefulSet in OVH
      - name: Deploy MongoDB in OVH
        run: |
          kubectl apply -f ./k3s/mongo-statefulset-ovh.yaml
          kubectl get pods -n mongodb-cluster
          kubectl get svc -n mongodb-cluster

  init-replicaset:
    needs: [deploy-aws, deploy-ovh] # Menunggu deployment selesai di AWS dan OVH
    runs-on: ubuntu-latest
    steps:
      # 1. Configure K3s Access (AWS)
      - name: Configure K3s Access for AWS
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.AWS_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # 2. Initialize MongoDB Replica Set
      - name: Initialize MongoDB Replica Set
        run: |
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval "
          rs.initiate({
            _id: 'rs0',
            members: [
              { _id: 0, host: 'mongodb-aws-0.mongodb-aws-service:27017' },
              { _id: 1, host: 'mongodb-aws-1.mongodb-aws-service:27017' },
              { _id: 2, host: 'mongodb-aws-2.mongodb-aws-service:27017' },
              { _id: 3, host: 'mongodb-ovh-0.mongodb-ovh-service:27017' },
              { _id: 4, host: 'mongodb-ovh-1.mongodb-ovh-service:27017' },
              { _id: 5, host: 'mongodb-ovh-2.mongodb-ovh-service:27017' }
            ]
          });"
          kubectl exec -it mongodb-aws-0 -n mongodb-cluster -- mongo --eval 'rs.status();'
