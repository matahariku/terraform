name: Setup Services with Ansible

on:
  workflow_dispatch: # Jalankan secara manual

jobs:
  setup_services:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install Dependencies
      - name: Install Required Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-dev libffi-dev gcc libssl-dev

      # 3. Install Ansible via pip
      - name: Install Ansible
        run: |
          pip3 install ansible
          ansible --version

      # 4. Add Host Keys to known_hosts
      - name: Add SSH Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.230.198.148 >> ~/.ssh/known_hosts
          ssh-keyscan -H 3.219.134.157 >> ~/.ssh/known_hosts

      # 5. Set Up SSH Private Key
      - name: Set Up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_BLOC4 }}" > ~/.ssh/KEY_BLOC4.pem
          chmod 600 ~/.ssh/KEY_BLOC4.pem

      # 6. Run Ansible Playbook
      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/setup.yml
        env:
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/KEY_BLOC4.pem
