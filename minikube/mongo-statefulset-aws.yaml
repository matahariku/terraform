apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-aws
  namespace: aws-namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  serviceName: "mongo-aws-service"
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: root
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: devops
        - name: MONGO_REPLICA_SET
          value: rs0
        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--bind_ip"
        - "0.0.0.0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates: []
  volumes:
  - name: mongo-data
    hostPath:
      path: /var/lib/mongo-aws
      type: DirectoryOrCreate


