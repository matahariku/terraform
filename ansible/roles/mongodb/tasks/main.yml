- name: Add MongoDB repository for Amazon Linux
  ansible.builtin.yum_repository:
    name: mongodb-org-6.0
    description: MongoDB Repository
    baseurl: "https://repo.mongodb.org/yum/amazon/2023/mongodb-org/6.0/x86_64/"
    gpgcheck: yes
    gpgkey: "https://www.mongodb.org/static/pgp/server-6.0.asc"
    enabled: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Update yum cache
  ansible.builtin.yum:
    update_cache: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Install MongoDB and Mongosh
  ansible.builtin.yum:
    name:
      - mongodb-org
      - mongodb-mongosh
    state: present
  when: ansible_facts['distribution'] == "Amazon"

- name: Start MongoDB service
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: yes
  when: ansible_facts['distribution'] == "Amazon"

- name: Verify MongoDB installation
  ansible.builtin.command:
    cmd: mongod --version
  register: mongod_version
  ignore_errors: yes

- name: Display MongoDB version
  ansible.builtin.debug:
    msg: "MongoDB version: {{ mongod_version.stdout }}"
